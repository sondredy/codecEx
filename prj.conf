CONFIG_LOG=y

# liblc3 (compiled from source in CMakeLists.txt) uses the full C library
# (math, etc.). The CONFIG_LIBLC3 option would normally select this, but we
# bypass that option because it depends on FPU, which the FLPR core lacks.
CONFIG_REQUIRES_FULL_LIBC=y

# Codec contexts are static; the codec uses a fair amount of stack.
CONFIG_MAIN_STACK_SIZE=16384

# On cores that have an FPU (e.g. cpuapp) this builds with hardware float and
# is ignored (soft-float) on the FLPR, which has no FPU.
CONFIG_FPU=y
